<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorthMyTime | O custo real das coisas</title>
    <style>
        :root {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #10b981;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            margin-top: 0;
            margin-bottom: 1.8rem; 
            font-weight: 800;
            font-size: 2rem;
        }

        .input-group { margin-bottom: 1.2rem; }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 1.2rem;
        }
        
        .col { flex: 1; }

        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 0.85rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: #f9fafb;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            background: #ffffff;
        }

        input:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .result-card {
            margin-top: 2rem;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        #time-result { 
            font-size: 2.2rem; 
            font-weight: 800; 
            color: #047857; 
            display: block; 
        }

        .sub-text {
            font-size: 0.9rem;
            color: #065f46;
            margin-top: 5px;
            display: block;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WorthMyTime</h1>
    
    <div class="row">
        <div class="col">
            <label>Moeda</label>
            <select id="currency">
                <option value="R$">BRL (R$)</option>
                <option value="$">USD ($)</option>
                <option value="€">EUR (€)</option>
            </select>
        </div>
        <div class="col">
            <label>Exibir em</label>
            <select id="timeFormat">
                <option value="auto">Automático</option>
                <option value="minutes">Minutos</option>
                <option value="hours">Horas</option>
                <option value="days">Dias de Trab.</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label id="labelSalary">Seu Salário Mensal (R$)</label>
        <input type="number" id="salary" placeholder="Ex: 3500">
    </div>

    <div class="row">
        <div class="col" style="flex: 1.5;">
            <label>Escala de Trabalho</label>
            <select id="workScale">
                <option value="5x2">5x2 (5 dias de trabalho)</option>
                <option value="6x1">6x1 (6 dias de trabalho)</option>
                <option value="12x36">12x36 (Plantão)</option>
                <option value="custom">Personalizada</option>
            </select>
        </div>
        <div class="col" style="flex: 1;">
            <label id="labelTimeInput">Horas por dia</label>
            <input type="number" id="timeInput" placeholder="Ex: 8">
        </div>
    </div>

    <div class="input-group">
        <label id="labelPrice">Preço do Produto (R$)</label>
        <input type="number" id="productPrice" placeholder="Ex: 1200">
    </div>

    <div id="resultArea" class="result-card">
        <span id="time-result">0</span>
        <span class="sub-text" id="days-info">do seu tempo de vida</span>
    </div>
</div>

<script>
    const inputs = ['salary', 'timeInput', 'productPrice', 'currency', 'timeFormat', 'workScale'];
    
    // Escuta mudanças
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', updateInterfaceAndCalculate);
    });

    // Função para adaptar o campo de horas com base na escala
    function handleScaleChange() {
        const scale = document.getElementById('workScale').value;
        const timeInputLabel = document.getElementById('labelTimeInput');
        const timeInput = document.getElementById('timeInput');

        if (scale === '12x36') {
            timeInputLabel.innerText = "Por plantão";
            timeInput.value = 12; // Trava em 12 horas
            timeInput.disabled = true;
        } else if (scale === 'custom') {
            timeInputLabel.innerText = "Horas na semana";
            timeInput.placeholder = "Ex: 44";
            timeInput.disabled = false;
        } else {
            timeInputLabel.innerText = "Horas por dia";
            timeInput.placeholder = "Ex: 8";
            timeInput.disabled = false;
        }
    }

    // Escuta mudança específica na escala para rodar a adaptação visual
    document.getElementById('workScale').addEventListener('change', handleScaleChange);

    function updateInterfaceAndCalculate() {
        // Atualiza moedas
        const currencySymbol = document.getElementById('currency').value;
        document.getElementById('labelSalary').innerText = `Seu Salário Mensal (${currencySymbol})`;
        document.getElementById('labelPrice').innerText = `Preço do Produto (${currencySymbol})`;

        const salary = parseFloat(document.getElementById('salary').value);
        const timeValue = parseFloat(document.getElementById('timeInput').value);
        const price = parseFloat(document.getElementById('productPrice').value);
        const format = document.getElementById('timeFormat').value;
        const scale = document.getElementById('workScale').value;

        if (salary > 0 && timeValue > 0 && price > 0) {
            let monthlyHours = 0;

            // Matemática precisa baseada na escala (4.33 semanas por mês)
            if (scale === '12x36') {
                monthlyHours = 180; // Média de 15 plantões de 12h
            } else if (scale === '5x2') {
                monthlyHours = (timeValue * 5) * 4.33; 
            } else if (scale === '6x1') {
                monthlyHours = (timeValue * 6) * 4.33;
            } else if (scale === 'custom') {
                monthlyHours = timeValue * 4.33; // Comportamento antigo
            }

            const hourlyRate = salary / monthlyHours;
            const totalHoursNeeded = price / hourlyRate;

            // Passamos timeValue (horas por dia) para calcular dias exatos depois
            displayResult(totalHoursNeeded, format, scale, timeValue);
        } else {
            document.getElementById('resultArea').style.display = 'none';
        }
    }

    function displayResult(hours, format, scale, hoursPerDay) {
        const resultArea = document.getElementById('resultArea');
        const timeResult = document.getElementById('time-result');
        const daysInfo = document.getElementById('days-info');

        resultArea.style.display = 'block';
        daysInfo.innerText = "do seu tempo de vida"; 

        // Define divisor para calcular "dias". Se for semanal (custom), usa 8h como padrão.
        const dailyDivisor = (scale === 'custom') ? 8 : hoursPerDay;

        if (format === 'minutes') {
            timeResult.innerText = `${(hours * 60).toFixed(0)} Minutos`;
        } 
        else if (format === 'hours') {
            timeResult.innerText = `${hours.toFixed(1)} Horas`;
        } 
        else if (format === 'days') {
            const days = (hours / dailyDivisor).toFixed(1);
            timeResult.innerText = `${days} Dias`;
            daysInfo.innerText = `úteis de trabalho (${dailyDivisor}h/dia)`;
        } 
        else {
            if (hours < 1) {
                timeResult.innerText = `${(hours * 60).toFixed(0)} Minutos`;
            } else if (hours < 24) {
                timeResult.innerText = `${hours.toFixed(1)} Horas`;
            } else {
                const days = (hours / dailyDivisor).toFixed(1);
                timeResult.innerText = `${hours.toFixed(0)} Horas`;
                daysInfo.innerText = `Ou aprox. ${days} dias úteis (${dailyDivisor}h/dia).`;
            }
        }
    }
</script>

</body>
</html>
