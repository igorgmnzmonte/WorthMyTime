<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorthMyTime | O custo real das coisas</title>
    <style>
        :root {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #10b981;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            margin-top: 0;
            margin-bottom: 1.8rem; 
            font-weight: 800;
            font-size: 2rem;
        }

        .input-group { margin-bottom: 1.2rem; }

        /* Estilo para colocar os seletores lado a lado */
        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 1.2rem;
        }
        
        .col { flex: 1; }

        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 0.85rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: #f9fafb;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            background: #ffffff;
        }

        .result-card {
            margin-top: 2rem;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        #time-result { 
            font-size: 2.2rem; 
            font-weight: 800; 
            color: #047857; 
            display: block; 
        }

        .sub-text {
            font-size: 0.9rem;
            color: #065f46;
            margin-top: 5px;
            display: block;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WorthMyTime</h1>
    
    <div class="row">
        <div class="col">
            <label>Moeda</label>
            <select id="currency">
                <option value="R$">BRL (R$)</option>
                <option value="$">USD ($)</option>
                <option value="€">EUR (€)</option>
            </select>
        </div>
        <div class="col">
            <label>Exibir em</label>
            <select id="timeFormat">
                <option value="auto">Automático</option>
                <option value="minutes">Minutos</option>
                <option value="hours">Horas</option>
                <option value="days">Dias (8h)</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label id="labelSalary">Seu Salário Mensal (R$)</label>
        <input type="number" id="salary" placeholder="Ex: 3500">
    </div>

    <div class="input-group">
        <label>Horas de trabalho por semana</label>
        <input type="number" id="hoursWeek" placeholder="Ex: 44">
    </div>

    <div class="input-group">
        <label id="labelPrice">Preço do Produto (R$)</label>
        <input type="number" id="productPrice" placeholder="Ex: 1200">
    </div>

    <div id="resultArea" class="result-card">
        <span id="time-result">0</span>
        <span class="sub-text" id="days-info">do seu tempo de vida</span>
    </div>
</div>

<script>
    const inputs = ['salary', 'hoursWeek', 'productPrice', 'currency', 'timeFormat'];
    
    // Escuta mudanças em TODOS os campos (inputs e selects)
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', updateInterfaceAndCalculate);
    });

    function updateInterfaceAndCalculate() {
        // 1. Atualiza as labels de moeda dinamicamente
        const currencySymbol = document.getElementById('currency').value;
        document.getElementById('labelSalary').innerText = `Seu Salário Mensal (${currencySymbol})`;
        document.getElementById('labelPrice').innerText = `Preço do Produto (${currencySymbol})`;

        // 2. Coleta os valores numéricos
        const salary = parseFloat(document.getElementById('salary').value);
        const hoursWeek = parseFloat(document.getElementById('hoursWeek').value);
        const price = parseFloat(document.getElementById('productPrice').value);
        const format = document.getElementById('timeFormat').value;

        // 3. Executa o cálculo
        if (salary > 0 && hoursWeek > 0 && price > 0) {
            const monthlyHours = hoursWeek * 4.33;
            const hourlyRate = salary / monthlyHours;
            const totalHoursNeeded = price / hourlyRate;

            displayResult(totalHoursNeeded, format);
        } else {
            document.getElementById('resultArea').style.display = 'none';
        }
    }

    function displayResult(hours, format) {
        const resultArea = document.getElementById('resultArea');
        const timeResult = document.getElementById('time-result');
        const daysInfo = document.getElementById('days-info');

        resultArea.style.display = 'block';
        daysInfo.innerText = "do seu tempo de vida"; // Reset padrão

        // Lógica de exibição baseada na escolha do usuário
        if (format === 'minutes') {
            timeResult.innerText = `${(hours * 60).toFixed(0)} Minutos`;
        } 
        else if (format === 'hours') {
            timeResult.innerText = `${hours.toFixed(1)} Horas`;
        } 
        else if (format === 'days') {
            const days = (hours / 8).toFixed(1);
            timeResult.innerText = `${days} Dias`;
            daysInfo.innerText = "úteis de trabalho (8h/dia)";
        } 
        else {
            // Modo Automático (comportamento original)
            if (hours < 1) {
                timeResult.innerText = `${(hours * 60).toFixed(0)} Minutos`;
            } else if (hours < 24) {
                timeResult.innerText = `${hours.toFixed(1)} Horas`;
            } else {
                const days = (hours / 8).toFixed(1);
                timeResult.innerText = `${hours.toFixed(0)} Horas`;
                daysInfo.innerText = `Ou aprox. ${days} dias úteis (8h/dia).`;
            }
        }
    }
</script>

</body>
</html>
